<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PROECO — Admin Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preconnect" href="https://cdnjs.cloudflare.com"/>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&family=Montserrat:wght@400&display=swap" rel="stylesheet"/>
<style>
  :root{--silver:#3a4a5c;--silver-dim:#536070;--border:rgba(0,0,0,0.09);--border-bright:rgba(0,0,0,0.16);}
  *{box-sizing:border-box;}
  html,body{height:100%;background:#f8f8f8;}
  body{color:#1a1a1a;font-family:'Inter',sans-serif;font-weight:300;overflow-x:hidden;}
  ::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:#f8f8f8;}::-webkit-scrollbar-thumb{background:#b0bec5;border-radius:2px;}

  .login-card{background:#ffffff;border:1px solid var(--border);border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.06),0 2px 8px rgba(0,0,0,0.04);}

  .section-label{display:inline-flex;align-items:center;gap:8px;font-size:10px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:rgba(232,120,48,0.85);}
  .section-label::before{content:'';width:18px;height:1px;background:rgba(232,120,48,0.6);}

  .input-field{width:100%;padding:12px 16px;border:1px solid var(--border-bright);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:300;color:#1a1a1a;background:#fafafa;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
  .input-field::placeholder{color:rgba(83,96,112,0.6);}
  .input-field:focus{border-color:rgba(232,120,48,0.6);box-shadow:0 0 0 3px rgba(232,120,48,0.08);background:#fff;}

  .input-label{display:block;font-size:11px;font-weight:400;letter-spacing:0.06em;text-transform:uppercase;color:var(--silver-dim);margin-bottom:8px;}

  .btn-submit{width:100%;padding:13px 24px;background:linear-gradient(135deg,#ff9a3c,#ff6b00);border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#fff;cursor:pointer;transition:opacity 0.2s,transform 0.15s;position:relative;overflow:hidden;}
  .btn-submit:hover{opacity:0.92;transform:translateY(-1px);}
  .btn-submit:active{transform:translateY(0);}
  .btn-submit:disabled{opacity:0.55;cursor:not-allowed;transform:none;}

  .error-box{display:none;padding:12px 16px;background:rgba(220,38,38,0.06);border:1px solid rgba(220,38,38,0.2);border-radius:8px;font-size:12px;font-weight:400;color:#b91c1c;line-height:1.5;}
  .error-box.visible{display:block;}

  .back-link{font-size:11px;font-weight:300;color:var(--silver-dim);text-decoration:none;letter-spacing:0.04em;transition:color 0.2s;display:inline-flex;align-items:center;gap:6px;}
  .back-link:hover{color:#1a1a1a;}

  .divider{height:1px;background:var(--border);margin:28px 0;}

  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px;}
</style>
</head>
<body>

<!-- ── 1. Supabase config (plain script — must run before the modules) ──────── -->
<script>
  window.SUPABASE_URL = 'https://rxfdswgokcqsdoebzclr.supabase.co';
  window.SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4ZmRzd2dva2Nxc2RvZWJ6Y2xyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjY5NDEsImV4cCI6MjA5Mjg0Mjk0MX0.j1mtZaniHx-LX0AoIsTj4tmFMtPkP2GGBjia5x2ZTm0';
</script>

<!-- ── 2. Init Supabase client ───────────────────────────────────────────────── -->
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
  window.supabase = createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
</script>

<!-- ── 3. Login form handler ─────────────────────────────────────────────────── -->
<script type="module">
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submitBtn');
    const errorBox = document.getElementById('errorBox');

    // Reset error
    errorBox.textContent = '';
    errorBox.classList.remove('visible');

    // Loading state
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Accesso in corso…';

    const { error } = await window.supabase.auth.signInWithPassword({ email, password });

    if (error) {
      errorBox.textContent = error.message === 'Invalid login credentials'
        ? 'Email o password non corretti. Riprova.'
        : error.message;
      errorBox.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Accedi';
      return;
    }

    // Success → redirect
    window.location.href = 'admin.html';
  });
</script>

<!-- ── PAGE ──────────────────────────────────────────────────────────────────── -->
<div class="min-h-screen flex flex-col items-center justify-center px-4 py-16">

  <!-- Back to home -->
  <div class="w-full max-w-md mb-8" data-aos="fade-down" data-aos-duration="400">
    <a href="index.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
      Torna alla home
    </a>
  </div>

  <!-- Card -->
  <div class="login-card w-full max-w-md p-10" data-aos="fade-up" data-aos-duration="500">

    <!-- Logo -->
    <div class="mb-8 flex items-center gap-0">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 72" height="40" style="display:block">
        <circle cx="35.7" cy="35.7" r="35.4" fill="#1a1a1a"/>
        <circle cx="35.7" cy="35.7" r="23.9" fill="#f8f8f8"/>
        <rect x="27.2" y="27.9" width="16.6" height="16.6" rx="1" fill="#e87830"/>
        <text x="82" y="53" font-family="'Montserrat',sans-serif" font-weight="400" font-size="38" letter-spacing="2"><tspan fill="#1a1a1a">PRO</tspan><tspan fill="#e87830">ECO</tspan></text>
      </svg>
    </div>

    <!-- Header -->
    <div class="mb-8">
      <div class="section-label mb-3">Area Riservata</div>
      <h1 style="font-family:'Syne',sans-serif;font-size:26px;font-weight:700;color:#1a1a1a;line-height:1.2;letter-spacing:-0.02em;">
        Accesso Admin
      </h1>
      <p class="mt-2" style="font-size:12px;font-weight:300;color:var(--silver-dim);line-height:1.6;">
        Inserisci le tue credenziali per accedere al pannello di gestione.
      </p>
    </div>

    <!-- Form -->
    <form id="loginForm" novalidate>
      <div class="mb-5">
        <label class="input-label" for="email">Email</label>
        <input
          id="email"
          type="email"
          class="input-field"
          placeholder="nome@proecosrl.it"
          autocomplete="email"
          required
        />
      </div>

      <div class="mb-6">
        <label class="input-label" for="password">Password</label>
        <input
          id="password"
          type="password"
          class="input-field"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <!-- Error message -->
      <div id="errorBox" class="error-box mb-5" role="alert"></div>

      <button id="submitBtn" type="submit" class="btn-submit">Accedi</button>
    </form>

    <div class="divider"></div>

    <p style="font-size:11px;font-weight:300;color:var(--silver-dim);text-align:center;line-height:1.6;">
      Accesso riservato al personale PROECO autorizzato.<br/>
      Per assistenza contatta <a href="mailto:proeco@proecosrl.it" style="color:var(--silver);text-decoration:none;">proeco@proecosrl.it</a>
    </p>

  </div>

  <!-- Footer note -->
  <p class="mt-8" style="font-size:10px;font-weight:300;color:rgba(83,96,112,0.5);letter-spacing:0.06em;" data-aos="fade-up" data-aos-delay="100">
    &copy; 2025 PROECO S.r.l. &mdash; Tutti i diritti riservati
  </p>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>AOS.init({ duration: 500, once: true, offset: 0 });</script>
</body>
</html>
