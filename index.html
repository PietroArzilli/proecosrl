<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PROECO — Engineering the Future, Bravely.</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
  :root {
    --silver:#d0d8e0; --silver-dim:#c8d0d8; --steel:#dde4ea;
    --border:rgba(200,210,220,0.25); --border-bright:rgba(200,210,220,0.55);
  }
  * { box-sizing:border-box; cursor: none !important; }
  html { background:#282828; }
  body { 
    background:#282828; color:#e8ecf0; font-family:'Inter',sans-serif; 
    font-weight:300; overflow-x:hidden; 
  }

  /* Il nuovo sfondo Three.js */
  #dotted-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1; pointer-events: none; opacity: 0.4;
  }

  /* --- MANTENGO I TUOI STILI ORIGINALI --- */
  .syne { font-family: 'Syne', sans-serif; }
  .cursor-dot { width:6px; height:6px; background:#fff; border-radius:50%; position:fixed; pointer-events:none; z-index:10000; transition: transform 0.1s; }
  .cursor-outline { width:30px; height:30px; border:1px solid rgba(255,255,255,0.3); border-radius:50%; position:fixed; pointer-events:none; z-index:9999; transition: transform 0.15s, width 0.3s, height 0.3s; }
  
  /* ... (Qui restano tutti i tuoi 1300 righi di CSS e HTML) ... */
  .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid var(--border); }
  .orange-gradient { background: linear-gradient(135deg, #ff6b00 0%, #ff8800 100%); }
</style>
</head>
<body>

<div class="cursor-dot" id="dot"></div>
<div class="cursor-outline" id="outline"></div>

<div id="dotted-canvas"></div>

<nav class="fixed top-0 left-0 w-full z-[100] border-b border-[var(--border)] bg-[#282828]/80 backdrop-blur-md">
    <div class="max-w-[1800px] mx-auto px-6 md:px-12 h-20 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 orange-gradient rounded-lg flex items-center justify-center font-bold text-white shadow-lg shadow-orange-500/20">P</div>
            <span class="syne font-extrabold text-2xl tracking-tighter uppercase italic">PROECO</span>
        </div>
        <div class="hidden lg:flex items-center gap-12 text-[10px] font-bold uppercase tracking-[0.3em] text-[var(--silver-dim)]">
            <a href="#services" class="hover:text-white transition-colors tracking-widest">Services</a>
            <a href="#sectors" class="hover:text-white transition-colors tracking-widest">Sectors</a>
            <a href="#projects" class="hover:text-white transition-colors tracking-widest">Projects</a>
            <a href="#contact" class="px-6 py-3 rounded-full border border-orange-500/30 text-orange-500 hover:bg-orange-500 hover:text-white transition-all">Get in Touch</a>
        </div>
    </div>
</nav>

<section class="relative min-h-screen flex items-center pt-20">
    <div class="max-w-[1800px] mx-auto px-6 md:px-12 w-full grid lg:grid-cols-2 gap-20">
        <div data-aos="fade-up">
            <div class="flex items-center gap-3 mb-8">
                <div class="h-[1px] w-12 bg-orange-500"></div>
                <span class="text-orange-500 font-bold text-[10px] uppercase tracking-[0.4em]">Industrial Evolution</span>
            </div>
            <h1 class="syne text-6xl md:text-8xl lg:text-[110px] font-extrabold leading-[0.9] tracking-tighter mb-12 italic">
                ENGINEERING <br/> <span class="text-transparent bg-clip-text bg-gradient-to-r from-white via-orange-500 to-orange-600">THE FUTURE,</span> <br/> BRAVELY.
            </h1>
            <p class="text-[var(--silver-dim)] text-xl max-w-xl leading-relaxed mb-12 font-light">
                We design and build complex industrial systems with a focus on safety, efficiency, and bold innovation.
            </p>
        </div>
    </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
    // 1. Inizializza AOS (le tue animazioni)
    AOS.init({ duration: 1000, once: true });

    // 2. Cursor (Il tuo vecchio script)
    const dot = document.getElementById('dot');
    const outline = document.getElementById('outline');
    window.addEventListener('mousemove', (e) => {
        dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
        outline.style.left = e.clientX - 12 + 'px'; outline.style.top = e.clientY - 12 + 'px';
    });

    // 3. EFFETTO DOTTED SURFACE (INTEGRATO)
    let scene, camera, renderer, points, count = 0;
    const AMOUNTX = 50, AMOUNTY = 50, SEPARATION = 100;

    function initDottedSurface() {
        const container = document.getElementById('dotted-canvas');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.set(0, 400, 1000);

        renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const numParticles = AMOUNTX * AMOUNTY;
        const positions = new Float32Array(numParticles * 3);
        const colors = new Float32Array(numParticles * 3);

        let i = 0;
        for (let ix = 0; ix < AMOUNTX; ix++) {
            for (let iy = 0; iy < AMOUNTY; iy++) {
                positions[i * 3] = ix * SEPARATION - ((AMOUNTX * SEPARATION) / 2); // x
                positions[i * 3 + 1] = 0; // y
                positions[i * 3 + 2] = iy * SEPARATION - ((AMOUNTY * SEPARATION) / 2); // z
                
                // Colore arancione sfumato verso il bianco per i punti
                colors[i * 3] = 1; // R
                colors[i * 3 + 1] = 0.4; // G
                colors[i * 3 + 2] = 0.1; // B
                i++;
            }
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({ 
            size: 3, 
            vertexColors: true, 
            transparent: true, 
            opacity: 0.6 
        });

        points = new THREE.Points(geometry, material);
        scene.add(points);

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        const positions = points.geometry.attributes.position.array;
        let i = 0;
        for (let ix = 0; ix < AMOUNTX; ix++) {
            for (let iy = 0; iy < AMOUNTY; iy++) {
                // L'onda del componente 21st dev
                positions[i * 3 + 1] = (Math.sin((ix + count) * 0.3) * 50) + (Math.sin((iy + count) * 0.5) * 50);
                i++;
            }
        }
        points.geometry.attributes.position.needsUpdate = true;
        renderer.render(scene, camera);
        count += 0.1;
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    initDottedSurface();
</script>
</body>
</html>
